name: navalforge-concept

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-navalforge}
      POSTGRES_USER: ${POSTGRES_USER:-navalforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-navalforge}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-navalforge} -d ${POSTGRES_DB:-navalforge}"]
      interval: 5s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-navalforge}:${POSTGRES_PASSWORD:-navalforge}@db:5432/${POSTGRES_DB:-navalforge}
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
      CELERY_ENABLED: "true"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080}
    volumes:
      - report_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"

  worker:
    build:
      context: .
      dockerfile: backend/Dockerfile
    command: celery -A backend.app.tasks.celery_app worker --loglevel=INFO --concurrency=2
    environment:
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-navalforge}:${POSTGRES_PASSWORD:-navalforge}@db:5432/${POSTGRES_DB:-navalforge}
      REDIS_URL: redis://redis:6379/0
      STORAGE_DIR: /app/storage
      CELERY_ENABLED: "true"
    volumes:
      - report_storage:/app/storage
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_URL: same-origin
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  postgres_data:
  redis_data:
  report_storage:

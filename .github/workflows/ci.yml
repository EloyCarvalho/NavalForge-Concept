name: NavalForge CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e '.[api,dev]'
      - run: python scripts/seed_examples.py
      - run: python -m pytest --cov=navalforge_core --cov-report=term-missing
      - run: ruff check .
      - run: python -m compileall -q navalforge_core backend scripts

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npm run lint
        working-directory: frontend
      - run: npm run build
        working-directory: frontend

  docker-compose:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet

  backend-container:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f backend/Dockerfile -t navalforge-concept-api .
      - name: Start API container and verify health
        run: |
          docker run --detach --name navalforge-api --publish 8000:8000 navalforge-concept-api
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/ready >/dev/null; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              docker logs navalforge-api
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:8000/health
          curl --fail --silent http://127.0.0.1:8000/ready
